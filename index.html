<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DN STARUP | Premium Design Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');

        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Background Layer for Particles */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Tree Styling */
        .cherry-tree {
            position: absolute;
            top: 0;
            right: -50px;
            width: 500px;
            z-index: 5;
            filter: drop-shadow(0 0 20px rgba(255, 20, 147, 0.2));
            pointer-events: none;
        }

        /* Content Layer */
        .content-layer {
            position: relative;
            z-index: 10;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 0.85;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Asteroid Animation */
        .asteroid-box {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .portfolio-grid img {
            transition: transform 0.3s ease;
        }
        .portfolio-grid img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <img src="images/tree.png" class="cherry-tree" alt="Kwanzan Cherry Tree">

    <div class="content-layer">
        
        <nav class="flex justify-between items-center px-10 py-8">
            <div class="text-xl font-bold tracking-[0.3em]">DN STARUP</div>
            <div class="hidden md:flex space-x-10 text-xs tracking-widest text-gray-400">
                <a href="#" class="hover:text-white transition">SERVICES</a>
                <a href="#" class="hover:text-white transition">PORTFOLIO</a>
                <a href="#" class="hover:text-white transition">CONTACT</a>
            </div>
        </nav>

        <section class="px-10 mt-20">
            <p class="text-[10px] tracking-[0.5em] text-gray-500 mb-4 uppercase">Available for Projects</p>
            <h1 class="hero-title">GRAPHIC<br>DESIGN<br>STUDIO</h1>
            
            <div class="mt-10 flex space-x-6">
                <button class="px-8 py-3 border border-white/20 rounded-full text-[10px] tracking-widest hover:bg-white hover:text-black transition">GET FREE DESIGN</button>
                <button class="px-8 py-3 border border-white/20 rounded-full text-[10px] tracking-widest hover:bg-white hover:text-black transition uppercase">View Work</button>
            </div>
        </section>

        <section class="mt-40 px-10 pb-40 flex flex-col items-center">
            <div class="w-full text-left mb-20">
                <p class="text-[10px] tracking-[0.5em] text-gray-500 uppercase">Our Work</p>
                <h2 class="text-4xl font-bold uppercase mt-2">Portfolio</h2>
            </div>

            <div id="asteroid-trigger" class="asteroid-box relative cursor-pointer w-80 h-80 flex items-center justify-center">
                <img id="ast-whole" src="images/asteroid-whole.png" class="absolute w-full h-auto z-20 transition-all duration-300" alt="Asteroid">
                
                <img id="ast-broken" src="images/asteroid-broken.png" class="absolute w-full h-auto z-10 opacity-0 scale-50 transition-all duration-700" alt="Broken Asteroid">
            </div>

            <p id="click-hint" class="text-[10px] text-gray-600 tracking-widest mt-10 uppercase">Click the asteroid to reveal work</p>

            <div id="portfolio-gallery" class="hidden mt-20 w-full max-w-6xl">
                <h3 class="text-center text-xl font-bold mb-10 tracking-widest uppercase">YouTube Thumbnails</h3>
                <div class="portfolio-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="aspect-video bg-zinc-900 border border-white/5 rounded-lg overflow-hidden"><img src="images/work1.jpg" class="w-full h-full object-cover"></div>
                    <div class="aspect-video bg-zinc-900 border border-white/5 rounded-lg overflow-hidden"><img src="images/work2.jpg" class="w-full h-full object-cover"></div>
                    <div class="aspect-video bg-zinc-900 border border-white/5 rounded-lg overflow-hidden"><img src="images/work3.jpg" class="w-full h-full object-cover"></div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // 1. ASTEROID BREAK LOGIC
        const trigger = document.getElementById('asteroid-trigger');
        const whole = document.getElementById('ast-whole');
        const broken = document.getElementById('ast-broken');
        const gallery = document.getElementById('portfolio-gallery');
        const hint = document.getElementById('click-hint');

        let isBroken = false;

        trigger.addEventListener('click', () => {
            if (!isBroken) {
                // Break Effect
                whole.style.opacity = '0';
                whole.style.transform = 'scale(1.5) rotate(20deg)';
                
                broken.style.opacity = '1';
                broken.style.transform = 'scale(1.1)';
                
                // Show Portfolio
                setTimeout(() => {
                    gallery.classList.remove('hidden');
                    gallery.scrollIntoView({ behavior: 'smooth' });
                    hint.innerText = "100% Satisfaction Asteroid Guaranteed ✓";
                    broken.style.opacity = '0.2'; // Fade pieces to background
                    broken.style.filter = 'blur(10px)';
                }, 600);

                isBroken = true;
            }
        });

        // 2. STARS & BLOSSOMS ANIMATION
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            // Stars
            for(let i=0; i<80; i++) particles.push(new Particle('star'));
            // Blossoms
            for(let i=0; i<25; i++) particles.push(new Particle('blossom'));
        }

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = this.type === 'star' ? Math.random() * 2 : Math.random() * 4 + 2;
                this.speedX = this.type === 'star' ? (Math.random() - 0.5) * 0.2 : Math.random() * 1 + 0.5;
                this.speedY = this.type === 'star' ? (Math.random() - 0.5) * 0.2 : Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > width || this.x < 0 || this.y > height) {
                    this.y = -10;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.fillStyle = this.type === 'star' ? `rgba(255,255,255,${this.opacity})` : `rgba(255, 183, 197, ${this.opacity})`;
                ctx.beginPath();
                if(this.type === 'star') {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                } else {
                    ctx.ellipse(this.x, this.y, this.size, this.size/1.5, Math.PI/4, 0, Math.PI * 2);
                }
                ctx.fill();
            }
        }

        function loop() {
            ctx.clearRect(0,0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        loop();
    </script>
</body>
</html>
